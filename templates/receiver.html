<!DOCTYPE html>
<html>
<body>
  <button onclick="decrypt()">Download File</button>

  <script>
    const blob_b64 = "{{ blob_b64 }}";
    const filename  = "{{ filename }}";

    async function decrypt() {
      // Get key from URL fragment
      const key_b64 = window.location.hash.substring(1).split("key=")[1];
      
     // Decode base64url key → raw bytes
      const key_bytes = Uint8Array.from(
        atob(key_b64.replace(/-/g, '+').replace(/_/g, '/')),
        c => c.charCodeAt(0)
      );
     

      // Import key for AES-GCM
      const key = await crypto.subtle.importKey(
        "raw", key_bytes,
        { name: "AES-GCM" },
        false,
        ["decrypt"]
      );

      // Decode blob
      const blob_bytes = Uint8Array.from(atob(blob_b64), c => c.charCodeAt(0));

      // Split IV (first 12 bytes) + ciphertext (rest) — mirrors: blob = iv + ciphertext
      const iv         = blob_bytes.slice(0, 12);
      const ciphertext = blob_bytes.slice(12);

      // Decrypt
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: iv },
        key,
        ciphertext
      );

      // Trigger download
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([decrypted]));
      a.download = filename;
      a.click();
    }
  </script>
</body>
</html>
